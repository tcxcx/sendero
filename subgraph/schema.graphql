# ════════════════════════════════════════════════════════════════════
# SenderoGuestEscrow subgraph schema
# ════════════════════════════════════════════════════════════════════

enum TripStatus {
  ACTIVE
  CLAIMED
  CANCELLED
  EXPIRED
  SWEPT
}

enum BookingStatus {
  RESERVED
  COMMITTED
  SETTLED
  REFUNDED
  RECLAIMED
}

type Trip @entity(immutable: false) {
  "Trip id (bytes32 from contract)"
  id: Bytes!

  "Corporate buyer who funded"
  buyer: Bytes!

  "Peanut-style ephemeral claim address"
  claimPubKey20: Bytes!

  "Guest's MSCA once claimed (null if unclaimed)"
  guestWallet: Bytes

  "Total USDC locked (micro-USDC, 6 decimals)"
  budget: BigInt!

  "Sum of outstanding reservations"
  reserved: BigInt!

  "Sum settled to vendors + fees"
  spent: BigInt!

  "Expiry timestamp"
  expiresAt: BigInt!

  "Keccak of encrypted plaintext metadata"
  metadataHash: Bytes!

  "IPFS / Walrus CID of encrypted trip metadata"
  metadataCID: String!

  "ERC-8004 IdentityRegistry token id"
  agentTokenId: BigInt!

  status: TripStatus!

  "True once buyer has swept remaining funds"
  swept: Boolean!

  createdAt: BigInt!
  createdTx: Bytes!
  claimedAt: BigInt
  cancelledAt: BigInt
  sweptAt: BigInt
  sweptAmount: BigInt

  bookings: [Booking!]! @derivedFrom(field: "trip")
  agentActions: [AgentAction!]! @derivedFrom(field: "trip")
  events: [TripEvent!]! @derivedFrom(field: "trip")
}

type Booking @entity(immutable: false) {
  "Booking id (bytes32 from contract)"
  id: Bytes!

  trip: Trip!

  "Upper bound at reserve; equals actualAmount after commit"
  amount: BigInt!

  "Final amount (vendorAmount + fee), set at commit"
  actualAmount: BigInt!

  "Sendero take rate portion"
  fee: BigInt!

  "Duffel payout address or treasury splitter"
  vendor: Bytes

  "Keccak of encrypted itinerary plaintext"
  itineraryHash: Bytes

  "IPFS / Walrus CID of encrypted itinerary"
  itineraryCID: String

  "Operator-recorded Duffel order hash"
  duffelOrderHash: Bytes

  status: BookingStatus!

  reservedAt: BigInt!
  committedAt: BigInt
  confirmedAt: BigInt
  settledAt: BigInt
  refundedAt: BigInt

  "Non-null once the booking reached a terminal state"
  vendorAmount: BigInt

  "For reclaim path: the status before reclaim (RESERVED | COMMITTED)"
  reclaimedFromStatus: Int
}

type AgentAction @entity(immutable: true) {
  id: ID! # txHash-logIndex
  trip: Trip!
  agentTokenId: BigInt!
  actionType: Int! # 0=SEARCH, 1=CHAT, 2=HOLD, 3=COMMIT, 99=OTHER
  feeMicro: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

type TripEvent @entity(immutable: true) {
  id: ID! # txHash-logIndex
  trip: Trip!
  kind: String! # "created" | "claimed" | "cancelled" | "swept"
  # "booking.reserved" | "booking.committed"
  # "booking.confirmed" | "booking.settled"
  # "booking.refunded" | "booking.reclaimed"
  booking: Booking
  amount: BigInt
  txHash: Bytes!
  blockNumber: BigInt!
  timestamp: BigInt!
}

# Aggregate rollups for admin dashboard UI queries ─────────────────────

type BuyerAggregate @entity(immutable: false) {
  id: Bytes! # buyer address
  tripsCreated: BigInt!
  tripsActive: BigInt!
  tripsCompleted: BigInt!
  totalFunded: BigInt!
  totalSpent: BigInt!
  totalSwept: BigInt!
}

type AgentAggregate @entity(immutable: false) {
  id: BigInt! # agent token id
  tripsAssigned: BigInt!
  bookingsSettled: BigInt!
  totalFeeEarned: BigInt!
  actionCount: BigInt!
}
