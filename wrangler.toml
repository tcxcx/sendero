# STOPGAP — root wrangler.toml mirrors apps/edge/wrangler.toml so that the
# Cloudflare Workers Builds preview deploy command (`npx wrangler versions
# upload`, executed from the repo root) finds a config without `cd apps/edge`.
#
# Canonical config lives at apps/edge/wrangler.toml. This file MUST stay in
# sync with it — `name`, `compatibility_date`, `compatibility_flags`, and
# `[vars]` should be byte-identical. The only deliberate difference is `main`,
# which is rewritten to be relative to the repo root.
#
# Remove this file once the CF Workers Builds dashboard's "Preview deploy
# command" is updated to `bun run deploy:edge:preview` (see apps/edge/
# wrangler.toml header for the full list of canonical commands). At that
# point the dashboard runs deploys via the repo-owned npm scripts and the
# apps/edge/-local config is again the only source of truth.
#
# The 2026-04-25 incident: CF dashboard had divergent prod vs preview deploy
# commands. Prod did `cd apps/edge && bunx wrangler deploy` (works); preview
# did `npx wrangler versions upload` with no cd (broke). Until the dashboard
# is fixed, this file keeps preview deploys green.

name = "sendero-arc-edge"
main = "apps/edge/src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = true

[vars]
PORT = "8787"
SENDERO_DB_DRIVER = "neon"
