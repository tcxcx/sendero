<!-- @sendero/fonts parity. apps/app uses next/font/local (Geist + Fraunces +
     IoskeleyMono). Storybook isn't a Next app so we mirror with CDN equivalents:
     Geist + Geist Mono + Fraunces from Google Fonts. IoskeleyMono is OFL but
     not on a public CDN, so --font-mono-x falls back to Geist Mono in stories.
     Components rendering in the real app still get Ioskeley because it's
     stamped onto <html> by senderoFontVars. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap"
  rel="stylesheet"
/>

<style>
  :root {
    --sb-brand: #fb542b;
    --sb-bg: #fafaf7;

    /* Match the variable names next/font emits in the real apps so the
       same `var(--font-…)` references resolve here without fallback. */
    --font-geist-sans: 'Geist';
    --font-geist-mono: 'Geist Mono';
    --font-display: 'Fraunces';
    --font-mono-x: 'Geist Mono';
  }
  body {
    font-family: var(--font-geist-sans), system-ui, sans-serif;
  }
</style>
