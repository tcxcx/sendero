# Cloudflare Workers config — run `wrangler deploy` from apps/edge/
# to ship the Hono edge worker. Free tier covers hackathon traffic.
name = "sendero-arc-edge"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

[vars]
PORT = "8787"
# Force Prisma's Neon driver adapter — module-top `makeClient()` otherwise
# falls back to the Node path and crashes on Worker boot.
SENDERO_DB_DRIVER = "neon"
# All secrets (ANTHROPIC_API_KEY, CIRCLE_*, TREASURY_*, DATABASE_URL)
# must be pushed with `wrangler secret put <NAME>` — never commit them.
