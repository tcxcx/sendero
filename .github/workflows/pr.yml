name: PR

# Defense-in-depth for the local lefthook pre-push hooks. If a contributor
# bypasses lefthook with `git push --no-verify`, this workflow catches the
# regression on the PR before review. Mirrors the pre-push command set:
# typecheck + lint + build (turbo) + edge wrangler dry-run.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

env:
  SKIP_ENV_VALIDATION: "1"
  NEXT_DIST_DIR: ".next-turbo"
  # mise ships Node with a GPG-signed tarball; the signing key isn't in the
  # runner's default keyring (matches ci.yml). HTTPS + SHA still verify integrity.
  MISE_NODE_VERIFY: "false"

jobs:
  verify:
    name: Verify (typecheck + lint + build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so turbo's `--filter='...[origin/main]'` can resolve
          # the base ref and compute the affected workspace graph.
          fetch-depth: 0

      - name: Detect edge-affected paths
        id: edge-changed
        uses: dorny/paths-filter@v3
        with:
          filters: |
            edge:
              - 'apps/edge/**/*.ts'
              - 'apps/edge/**/*.toml'
              - 'apps/edge/**/*.jsonc'
              - 'apps/edge/**/*.json'
              - 'packages/tools/src/**/*.ts'
              - 'packages/agent/src/**/*.ts'
              - 'packages/arc/src/**/*.ts'
              - 'packages/circle/src/**/*.ts'
              - 'packages/duffel/src/**/*.ts'
              - 'packages/guest/src/**/*.ts'
              - 'packages/llms/src/**/*.ts'
              - 'packages/nanopayments/src/**/*.ts'
              - 'packages/seo/src/**/*.ts'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate --schema=packages/database/prisma/schema.prisma

      # TODO: wire TURBO_TOKEN + TURBO_TEAM here once Vercel Remote Cache is
      # provisioned for this repo. Until then, the cache is local-only per run
      # and the env vars would no-op.
      - name: Turbo typecheck + lint + build (affected workspaces)
        run: bunx turbo run typecheck lint build --filter='...[origin/main]' --cache-dir=.turbo

      - name: Edge worker wrangler dry-run
        if: steps.edge-changed.outputs.edge == 'true'
        run: bun run deploy:edge:dry-run
