name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_ONLY: "true"
  UV_THREADPOOL_SIZE: "14"
  NODE_OPTIONS: "--max-old-space-size=6144"
  SKIP_ENV_VALIDATION: "1"

jobs:
  validate:
    name: Typecheck + Lint + Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install mise-pinned tools (bun, node, prisma)
        uses: jdx/mise-action@v2
        with:
          version: 2025.1.0
          install: true
          cache: true

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate --schema=packages/database/prisma/schema.prisma

      - name: Turbo typecheck + lint + build (remote cached)
        run: bunx turbo run typecheck lint build --cache-dir=.turbo --concurrency=4

  edge-dry-run:
    name: Edge Worker (wrangler dry-run)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          version: 2025.1.0
          install: true
          cache: true

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile
      - run: bunx prisma generate --schema=packages/database/prisma/schema.prisma

      - name: Wrangler deploy --dry-run
        working-directory: apps/edge
        run: bunx wrangler deploy --dry-run --outdir=dist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
