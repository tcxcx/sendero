name: Defect-escape report

on:
  schedule:
    # Mondays 09:00 UTC — early enough that the team sees it before standup.
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  report:
    name: Compute + post weekly defect-escape report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so `git log --since=...` returns real numbers.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Run defect-escape report
        id: report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # --no-write: we don't need the ~/.gstack/projects/<slug>/ artifact in CI.
          bun run scripts/defect-escape-report.ts --since="14 days ago" --no-write > report.md
          {
            echo 'body<<__REPORT_EOF__'
            cat report.md
            echo '__REPORT_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Upsert sticky weekly issue
        uses: actions/github-script@v7
        env:
          REPORT_BODY: ${{ steps.report.outputs.body }}
        with:
          script: |
            const title = '📊 Defect-escape weekly report';
            const body = process.env.REPORT_BODY;

            // Find an existing sticky issue (open or closed) authored by the bot
            // with our exact title. Closed issues get reopened so the thread
            // accumulates history week-over-week.
            const { data: matches } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue in:title "${title}"`,
              per_page: 10,
            });

            const sticky = matches.items.find(i => i.title === title);

            if (sticky) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: sticky.number,
                body,
              });
              if (sticky.state === 'closed') {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: sticky.number,
                  state: 'open',
                });
              }
              core.notice(`Posted weekly comment on issue #${sticky.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['defect-escape'],
              });
              core.notice(`Created sticky issue #${created.data.number}`);
            }
