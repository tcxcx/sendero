name: Deploy Edge Worker

on:
  push:
    branches: [main]
    paths:
      - "apps/edge/**"
      - "packages/**"
      - "bun.lock"
      - ".github/workflows/deploy-edge.yml"
  workflow_dispatch:

concurrency:
  group: deploy-edge-${{ github.ref }}
  cancel-in-progress: false

env:
  UV_THREADPOOL_SIZE: "14"
  NODE_OPTIONS: "--max-old-space-size=6144"
  SKIP_ENV_VALIDATION: "1"

jobs:
  deploy:
    name: Cloudflare Workers deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://sendero-edge.workers.dev
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          version: 2025.1.0
          install: true
          cache: true

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate --schema=packages/database/prisma/schema.prisma

      - name: Typecheck edge
        run: bunx turbo run typecheck --filter=@sendero/edge

      - name: Deploy to Cloudflare Workers
        working-directory: apps/edge
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
