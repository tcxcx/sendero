name: Langfuse prompts

# Two triggers:
#
#   - On PRs that touch any of the prompt-source files (system prompts,
#     persona helper, seed scripts, snapshot itself). Catches the case where
#     a contributor edits a prompt either in code OR in the Langfuse UI but
#     forgets to commit the matching `langfuse-prompts.snapshot.json` update.
#
#   - On a daily schedule (08:00 UTC). Catches the case where someone edits
#     a prompt directly in the Langfuse UI and the snapshot drifts even
#     though no PR was opened. The job opens an issue when drift persists
#     overnight (a separate follow-up; today the failed run is the signal).
#
# Forked PRs cannot read repo secrets, so the diff step short-circuits with
# a friendly skip note when the head repo isn't ours. The daily scheduled
# run is the safety net for those cases.

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/app/lib/agent-persona.ts'
      - 'apps/app/app/api/inbox/rewrite/route.ts'
      - 'apps/app/workflows/stamps/shared/prompts.ts'
      - 'packages/agent/src/soul.ts'
      - 'scripts/seed-langfuse-prompts.ts'
      - 'scripts/seed-langfuse-slack-prompt.ts'
      - 'scripts/langfuse-prompts-pull.ts'
      - 'scripts/langfuse-prompts-diff.ts'
      - 'scripts/langfuse-prompts.snapshot.json'
      - '.github/workflows/langfuse-prompts.yml'
  schedule:
    # Daily at 08:00 UTC — catches overnight UI edits.
    - cron: '0 8 * * *'
  workflow_dispatch:

concurrency:
  group: langfuse-prompts-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SKIP_ENV_VALIDATION: '1'
  MISE_NODE_VERIFY: 'false'

jobs:
  diff:
    name: Snapshot vs live Langfuse
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Skip on PRs from forks — they can't read secrets. The daily scheduled
    # run is our safety net for changes that landed via a fork PR.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Diff snapshot vs live
        env:
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
        run: bun run langfuse:prompts:diff

      - name: Drift remediation hint
        if: failure()
        run: |
          echo "::error title=Langfuse prompt drift::The committed snapshot does not match live Langfuse."
          echo "Resolve with one of:"
          echo "  1. Run \`bun langfuse:prompts:pull\` locally and commit the updated snapshot (accepts UI edits)."
          echo "  2. Run \`bun langfuse:prompts:seed\` to push the code fallbacks back to Langfuse (rejects UI edits)."
