# lefthook.yml — Sendero × Arc parallel git hooks
#
# Install:          brew install lefthook && lefthook install --force
# Skip hooks once:  LEFTHOOK=0 git commit   OR   git commit --no-verify
# WIP bypass:       prefix commit with "wip" or "WIP" → pre-commit skipped
# Emergency push:   SKIP_PUSH_CHECKS=1 git push
#
# Ownership:
#   pre-commit → only what's staged (biome) + affected typecheck (HEAD^1)
#   pre-push   → full turbo build/typecheck/lint (catches pre-CI breakage)
#
# Fast-by-default. Heavy correctness (e2e, wrangler dry-run) stays in CI.

min_version: 1.7.0

pre-commit:
  parallel: true
  # Skip the whole hook for WIP commits — read the subject from prepared msg if
  # present, else let it through. Lefthook's native skip only reads env/branch,
  # so we rely on commit --no-verify or LEFTHOOK=0 for true bypass; the `wip`
  # branch skip below gives a lightweight ergonomic escape.
  skip:
    - ref: wip
    - ref: wip/*
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css}"
      run: bunx biome format --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

    # Typecheck only packages affected since the last commit. `...[HEAD^1]`
    # expands to changed workspace + downstream deps. Uses turbo daemon + cache.
    typecheck-affected:
      run: bunx turbo run typecheck --filter=...[HEAD^1] --cache-dir=.turbo

    # Static lint for Prisma migrations. Blocks the one-shot footgun
    # we hit in review: `ALTER TYPE ADD VALUE` combined with a same-file
    # reference to the new value. Also warns on CREATE INDEX without
    # CONCURRENTLY and ADD COLUMN NOT NULL without DEFAULT. Full rules
    # in scripts/check-prisma-migrations.ts. Bypass once with
    # SKIP_MIGRATION_CHECK=1.
    migration-lint:
      glob: "packages/database/prisma/migrations/*/migration.sql"
      run: bun run scripts/check-prisma-migrations.ts

pre-push:
  parallel: true
  commands:
    # Branch awareness — informational only. Feature branches skip Vercel
    # builds entirely (see per-app vercel.json ignoreCommand); only `main`
    # and `development` trigger deploys.
    branch-awareness:
      run: |
        branch=$(git rev-parse --abbrev-ref HEAD)
        if [ "$branch" = "main" ] || [ "$branch" = "development" ]; then
          echo "✓ pushing to $branch — Vercel will build changed apps"
        else
          echo "→ pushing feature branch '$branch' — no Vercel build (merge to development to preview-deploy)"
        fi

    build:
      skip:
        - run: test "${SKIP_PUSH_CHECKS:-0}" = "1"
      run: NEXT_DIST_DIR=${NEXT_DIST_DIR:-.next-turbo} bunx turbo run build --cache-dir=.turbo

    typecheck:
      skip:
        - run: test "${SKIP_PUSH_CHECKS:-0}" = "1"
      run: bunx turbo run typecheck --cache-dir=.turbo

    lint:
      skip:
        - run: test "${SKIP_PUSH_CHECKS:-0}" = "1"
      run: bunx turbo run lint --cache-dir=.turbo

    # Cloudflare Worker deploy validation. Catches config drift (missing
    # entry-point, bad bindings, broken wrangler.toml) BEFORE it lands on
    # CF Workers Builds.
    #
    # Why: 2026-04-25 the preview-branch deploy failed because the CF
    # dashboard's preview deploy command was `npx wrangler versions upload`
    # with no cd into apps/edge, so wrangler couldn't find wrangler.toml.
    # The dry-run below would have caught it locally. Both prod and preview
    # deploy commands in CF dashboard now call `bun run deploy:edge[:preview]`
    # which invokes the same wrangler from apps/edge — they can't diverge.
    #
    # Glob narrows to pushes that actually touch edge code or its workspace
    # deps (the worker's bundle).
    edge-deploy-check:
      glob: "{apps/edge/**/*.{ts,toml,jsonc,json},packages/{tools,agent,arc,circle,duffel,guest,llms,nanopayments,seo}/src/**/*.ts}"
      skip:
        - run: test "${SKIP_PUSH_CHECKS:-0}" = "1"
      run: bun run deploy:edge:dry-run

    # Stopgap drift check: while the root wrangler.toml exists (mirroring
    # apps/edge/wrangler.toml so CF Workers Builds preview deploys can find
    # a config), keep them in sync. Once the CF dashboard's preview deploy
    # command is updated to `bun run deploy:edge:preview`, delete the root
    # wrangler.toml + this hook + scripts/check-wrangler-sync.sh.
    wrangler-sync:
      glob: "wrangler.toml"
      skip:
        - run: test "${SKIP_PUSH_CHECKS:-0}" = "1"
      run: bash scripts/check-wrangler-sync.sh

commit-msg:
  commands:
    non-empty:
      run: |
        msg=$(cat {1})
        if [ -z "$(echo "$msg" | tr -d '[:space:]#')" ]; then
          echo "x empty commit message"; exit 1
        fi
    conventional:
      # Advisory only — warn but don't block.
      run: |
        msg=$(head -1 {1})
        pattern='^(feat|fix|chore|docs|style|refactor|perf|test|ci|build|revert|wip)(\([a-zA-Z0-9_/-]+\))?!?: .+'
        if ! echo "$msg" | grep -qE "$pattern"; then
          echo "! commit message does not follow Conventional Commits format"
          echo "  Expected: type(scope): description"
          echo "  Got:      $msg"
          echo "  (advisory — commit proceeds)"
        fi
    ship-metadata:
      # Advisory only — retro metadata should improve without blocking quick fixes.
      run: bun run scripts/check-commit-metadata.ts {1}
